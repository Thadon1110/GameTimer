<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}
			html {
				background: transparent;
			}
			body {
				background: rgba(2, 6, 23, 0.96);
				font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
				color: #f8fafc;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				height: 100vh;
				width: 100vw;
				gap: 20px;
				animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
				user-select: none;
				-webkit-user-select: none;
				cursor: default;
			}
			.icon {
				margin-bottom: 8px;
			}
			h1 {
				font-size: 36px;
				font-weight: 700;
			}
			h1.eyebreak {
				color: #60a5fa;
			}
			h1.daily {
				color: #f87171;
			}
			p {
				font-size: 18px;
				color: #94a3b8;
				text-align: center;
				max-width: 500px;
			}
			.countdown {
				font-family: 'Consolas', 'Courier New', monospace;
				font-size: 64px;
				font-weight: 700;
				color: #f8fafc;
				margin: 8px 0;
			}
			.close-btn {
				margin-top: 16px;
				padding: 14px 40px;
				border: 1px solid #334155;
				border-radius: 12px;
				background: #1e293b;
				color: #94a3b8;
				font-size: 15px;
				cursor: pointer;
				transition: all 0.2s;
			}
			.close-btn:hover {
				color: #f8fafc;
				background: #334155;
				border-color: #475569;
			}
			@keyframes fadeIn {
				from {
					opacity: 0;
				}
				to {
					opacity: 1;
				}
			}
		</style>
	</head>
	<body>
		<svg
			class="icon"
			id="icon-eye"
			width="64"
			height="64"
			viewBox="0 0 24 24"
			fill="none"
			stroke="#60a5fa"
			stroke-width="1.5"
			stroke-linecap="round"
			stroke-linejoin="round"
			style="display: none"
		>
			<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
			<circle cx="12" cy="12" r="3" />
		</svg>
		<svg
			class="icon"
			id="icon-warn"
			width="64"
			height="64"
			viewBox="0 0 24 24"
			fill="none"
			stroke="#f87171"
			stroke-width="1.5"
			stroke-linecap="round"
			stroke-linejoin="round"
		>
			<circle cx="12" cy="12" r="10" />
			<line x1="12" y1="8" x2="12" y2="12" />
			<line x1="12" y1="16" x2="12.01" y2="16" />
		</svg>
		<h1 id="title"></h1>
		<p id="body"></p>
		<div class="countdown" id="countdown" style="display: none"></div>
		<button class="close-btn" id="closeBtn">Zamknij</button>
		<script>
			var params = new URLSearchParams(window.location.search);
			var titleEl = document.getElementById('title');
			var bodyEl = document.getElementById('body');
			titleEl.textContent = params.get('title') || 'GameTimer';
			bodyEl.textContent = params.get('body') || '';
			var duration = parseInt(params.get('duration') || '0');
			var type = params.get('type') || '';
			var opacityParam = parseInt(params.get('opacity') || '96');
			var alpha = Math.max(10, Math.min(100, opacityParam)) / 100;
			document.body.style.background = 'rgba(2, 6, 23, ' + alpha + ')';

			// Show window after content is painted
			requestAnimationFrame(function () {
				requestAnimationFrame(function () {
					try {
						window.__TAURI_INTERNALS__.invoke('plugin:window|show');
					} catch (e) {}
				});
			});

			if (type === 'eyebreak') {
				titleEl.className = 'eyebreak';
				document.getElementById('icon-eye').style.display = 'block';
				document.getElementById('icon-warn').style.display = 'none';
			} else {
				titleEl.className = 'daily';
			}

			function pad(n) {
				return n < 10 ? '0' + n : '' + n;
			}
			function formatTime(s) {
				return pad(Math.floor(s / 60)) + ':' + pad(s % 60);
			}

			function closeWindow() {
				try {
					var label = window.__TAURI_INTERNALS__.metadata.currentWindow.label;
					window.__TAURI_INTERNALS__.invoke('close_alert_window', { label: label });
				} catch (e) {}
			}

			document.getElementById('closeBtn').onclick = closeWindow;

			if (duration > 0) {
				var remaining = duration;
				var countdownEl = document.getElementById('countdown');
				countdownEl.style.display = 'block';
				countdownEl.textContent = formatTime(remaining);
				var iv = setInterval(function () {
					remaining--;
					if (remaining <= 0) {
						countdownEl.textContent = formatTime(0);
						clearInterval(iv);
						setTimeout(closeWindow, 400);
					} else {
						countdownEl.textContent = formatTime(remaining);
					}
				}, 1000);
			}
		</script>
	</body>
</html>
