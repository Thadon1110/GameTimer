<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}
			html,
			body {
				background: #1e293b;
				font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
				overflow: hidden;
				height: 100%;
			}
			.toast {
				display: flex;
				gap: 14px;
				align-items: center;
				background: #1e293b;
				border-left: 3px solid #f59e0b;
				padding: 16px 18px;
				color: #f8fafc;
				height: 100%;
				animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
				position: relative;
			}
			.toast.eyebreak {
				border-left-color: #60a5fa;
			}
			.icon {
				width: 28px;
				height: 28px;
				flex-shrink: 0;
			}
			.content {
				flex: 1;
				min-width: 0;
			}
			.title {
				font-size: 13.5px;
				font-weight: 600;
				line-height: 1.3;
				letter-spacing: -0.01em;
			}
			.body {
				font-size: 12px;
				color: #94a3b8;
				margin-top: 4px;
				line-height: 1.4;
			}
			.close {
				background: none;
				border: none;
				color: #475569;
				cursor: pointer;
				padding: 4px;
				font-size: 16px;
				line-height: 1;
				border-radius: 4px;
				transition: all 0.15s;
			}
			.close:hover {
				color: #f8fafc;
				background: rgba(255, 255, 255, 0.08);
			}
			.timer-badge {
				font-family: 'Consolas', 'Courier New', monospace;
				font-size: 12px;
				padding: 2px 8px;
				border-radius: 6px;
				white-space: nowrap;
				flex-shrink: 0;
				color: #f59e0b;
				background: rgba(245, 158, 11, 0.15);
			}
			.timer-badge.eyebreak {
				color: #60a5fa;
				background: rgba(96, 165, 250, 0.15);
			}
			.progress-track {
				position: absolute;
				bottom: 0;
				left: 0;
				right: 0;
				height: 3px;
				background: rgba(255, 255, 255, 0.06);
			}
			.progress-fill {
				height: 100%;
				width: 100%;
				background: #f59e0b;
				transition: width 1s linear;
			}
			.progress-fill.eyebreak {
				background: #60a5fa;
			}
			@keyframes slideIn {
				from {
					transform: translateX(100px);
					opacity: 0;
				}
				to {
					transform: translateX(0);
					opacity: 1;
				}
			}
		</style>
	</head>
	<body>
		<div class="toast" id="toast">
			<svg
				class="icon"
				id="icon-warn"
				viewBox="0 0 24 24"
				fill="none"
				stroke="#f59e0b"
				stroke-width="2"
				stroke-linecap="round"
				stroke-linejoin="round"
			>
				<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
				<line x1="12" y1="9" x2="12" y2="13" />
				<line x1="12" y1="17" x2="12.01" y2="17" />
			</svg>
			<svg
				class="icon"
				id="icon-eye"
				style="display: none"
				viewBox="0 0 24 24"
				fill="none"
				stroke="#60a5fa"
				stroke-width="2"
				stroke-linecap="round"
				stroke-linejoin="round"
			>
				<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
				<circle cx="12" cy="12" r="3" />
			</svg>
			<div class="content">
				<div class="title" id="t"></div>
				<div class="body" id="b"></div>
			</div>
			<span class="timer-badge" id="timer" style="display: none"></span>
			<button class="close" id="closeBtn">&times;</button>
			<div class="progress-track" id="progressTrack" style="display: none">
				<div class="progress-fill" id="progressBar"></div>
			</div>
		</div>
		<script>
			var params = new URLSearchParams(window.location.search);
			document.getElementById('t').textContent = params.get('title') || 'GameTimer';
			document.getElementById('b').textContent = params.get('body') || '';
			var type = params.get('type') || '';
			var duration = parseInt(params.get('duration') || '0');
			if (type === 'eyebreak') {
				document.getElementById('toast').classList.add('eyebreak');
				document.getElementById('icon-warn').style.display = 'none';
				document.getElementById('icon-eye').style.display = 'block';
			}

			function getLabel() {
				try {
					return window.__TAURI_INTERNALS__.metadata.currentWindow.label;
				} catch (e) {
					return '';
				}
			}

			function closeWindow() {
				var label = getLabel();
				if (label) {
					try {
						window.__TAURI_INTERNALS__.invoke('close_alert_window', { label: label });
					} catch (e) {}
				}
			}

			function pad(n) {
				return n < 10 ? '0' + n : '' + n;
			}
			function formatTime(s) {
				return pad(Math.floor(s / 60)) + ':' + pad(s % 60);
			}

			// Show window only after content is painted
			requestAnimationFrame(function () {
				requestAnimationFrame(function () {
					try {
						window.__TAURI_INTERNALS__.invoke('plugin:window|show');
					} catch (e) {}
				});
			});

			document.getElementById('closeBtn').onclick = closeWindow;

			if (duration > 0) {
				var remaining = duration;
				var timerEl = document.getElementById('timer');
				var progressTrack = document.getElementById('progressTrack');
				var progressBar = document.getElementById('progressBar');
				timerEl.style.display = 'inline-block';
				progressTrack.style.display = 'block';
				if (type === 'eyebreak') {
					timerEl.classList.add('eyebreak');
					progressBar.classList.add('eyebreak');
				}
				timerEl.textContent = formatTime(remaining);
				var iv = setInterval(function () {
					remaining--;
					if (remaining <= 0) {
						timerEl.textContent = '00:00';
						progressBar.style.width = '0%';
						clearInterval(iv);
						setTimeout(closeWindow, 400);
					} else {
						timerEl.textContent = formatTime(remaining);
						progressBar.style.width = (remaining / duration) * 100 + '%';
					}
				}, 1000);
			}
		</script>
	</body>
</html>
